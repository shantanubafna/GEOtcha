site_name: GEOtcha
site_description: Extract and harmonize RNA-seq metadata from NCBI GEO
site_url: https://shantanubafna.github.io/GEOtcha/
repo_url: https://github.com/shantanubafna/GEOtcha
repo_name: shantanubafna/GEOtcha

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Python SDK: sdk-reference.md
  - Harmonization Guide: harmonization.md
  - Disease Packs: disease-packs.md
  - ML & LLM: ml-llm.md
  - Extending Ontologies: extending-ontologies.md
